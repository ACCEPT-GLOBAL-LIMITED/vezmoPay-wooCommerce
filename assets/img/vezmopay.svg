<!--
  VezmoPay lockup — light surfaces.

  Two changes from the supplied artwork, both deliberate:
  1. viewBox cropped 0 0 2000 2000 -> the real ink bounds (measured: x=164.4,
     y=822, w=1671.1, h=357.4). The original put the mark in ~15% of a square
     canvas, so it rendered tiny with huge dead padding wherever it was placed.
  2. The <style>/.st0 classes became inline fills. Class names in an inlined SVG
     leak into the page and collide with any other SVG using the same generated
     names.

  Dark surfaces: use vezmopayDark.svg (the wordmark is navy and disappears).
-->
